<svg width="300" height="400" viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Black background -->
  <rect width="300" height="400" fill="black"/>
  
  <!-- Left ear -->
  <ellipse cx="100" cy="120" rx="25" ry="80" fill="white" transform="rotate(-15 100 120)"/>
  
  <!-- Right ear -->
  <ellipse cx="200" cy="120" rx="25" ry="80" fill="white" transform="rotate(15 200 120)"/>
  
  <!-- Inner ear details -->
  <ellipse cx="100" cy="130" rx="12" ry="40" fill="#f0f0f0" transform="rotate(-15 100 130)"/>
  <ellipse cx="200" cy="130" rx="12" ry="40" fill="#f0f0f0" transform="rotate(15 200 130)"/>
  
  <!-- Head (partial, rounded top) -->
  <ellipse cx="150" cy="280" rx="70" ry="60" fill="white"/>
  
  <!-- Small nose -->
  <ellipse cx="150" cy="260" rx="4" ry="3" fill="#ffb3ba"/>
</svg>